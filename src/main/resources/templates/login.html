<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Live Chat</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/login.css}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
</head>
<body>

    <!-- extra ambient blobs for animated background -->
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <div class="auth-container">
        <h2>Welcome Back</h2>

        <div th:if="${param.error}" class="alert alert-error">
            <i class="fa-solid fa-circle-exclamation"></i> Invalid username or password.
        </div>

        <div th:if="${param.logout}" class="alert alert-success">
            <i class="fa-solid fa-circle-check"></i> You have been logged out.
        </div>

        <div th:if="${param.success}" class="alert alert-success">
            <i class="fa-solid fa-circle-check"></i> Registration successful! Please log in.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autocomplete="off" placeholder="Enter your username" />
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter your password" />
            </div>

            <button type="submit" class="auth-btn">
                <span class="btn-text">Log In</span>
            </button>
        </form>

        <div class="auth-links">
            Need an account? <a href="/register">Register here</a>
        </div>
    </div>

    <script>
        // Wait for DOM before animating
        document.addEventListener('DOMContentLoaded', () => {

            // Timeline for page entrance
            const tl = gsap.timeline({ defaults: { ease: "power3.out" } });

            tl.from(".auth-container", {
                opacity: 0,
                y: 40,
                scale: 0.96,
                duration: 0.7
            })
            .from("h2", {
                opacity: 0,
                y: -10,
                duration: 0.5
            }, "-=0.35")
            .from(".alert", {
                opacity: 0,
                y: -12,
                duration: 0.4
            }, "-=0.25")
            .from(".form-group", {
                opacity: 0,
                x: -25,
                duration: 0.45,
                stagger: 0.12
            }, "-=0.2")
            .from(".auth-btn", {
                opacity: 0,
                y: 15,
                duration: 0.4
            }, "-=0.15")
            .from(".auth-links", {
                opacity: 0,
                duration: 0.4
            }, "-=0.2");

            // Slow ambient blob drift (continuous, subtle)
            gsap.to(".blob-2", {
                x: 60,
                y: -40,
                duration: 10,
                repeat: -1,
                yoyo: true,
                ease: "sine.inOut"
            });
            gsap.to(".blob-3", {
                x: -50,
                y: 50,
                duration: 12,
                repeat: -1,
                yoyo: true,
                ease: "sine.inOut"
            });

            // Magnetic-ish button hover using GSAP
            const btn = document.querySelector(".auth-btn");
            btn.addEventListener("mouseenter", () => {
                gsap.to(btn, { scale: 1.03, duration: 0.25, ease: "power2.out" });
            });
            btn.addEventListener("mouseleave", () => {
                gsap.to(btn, { scale: 1, duration: 0.25, ease: "power2.out" });
            });
            btn.addEventListener("mousedown", () => {
                gsap.to(btn, { scale: 0.97, duration: 0.1 });
            });
            btn.addEventListener("mouseup", () => {
                gsap.to(btn, { scale: 1.03, duration: 0.15 });
            });

            // Input focus micro-animation
            document.querySelectorAll(".form-group input").forEach((input) => {
                input.addEventListener("focus", () => {
                    gsap.to(input, { y: -2, duration: 0.2, ease: "power2.out" });
                });
                input.addEventListener("blur", () => {
                    gsap.to(input, { y: 0, duration: 0.2, ease: "power2.out" });
                });
            });

            // Shake animation if there's an error alert on load
            const errorAlert = document.querySelector(".alert-error");
            if (errorAlert) {
                gsap.fromTo(errorAlert,
                    { x: 0 },
                    { x: 8, duration: 0.08, repeat: 5, yoyo: true, delay: 0.6, ease: "power1.inOut" }
                );
            }
        });
    </script>

</body>
</html>
