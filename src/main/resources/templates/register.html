<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register - Live Chat</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/register.css}">
</head>
<body>

    <div class="auth-container">
        <h2>Create Account</h2>

        <div th:if="${error}" class="alert alert-error">
            <i class="fa-solid fa-circle-exclamation"></i> <span th:text="${error}"></span>
        </div>

        <form action="/register" method="POST">
            <div class="form-group">
                <label for="username">Choose Username</label>
                <input type="text" id="username" name="username" placeholder="Enter a unique username" required autocomplete="off" />
            </div>

            <div class="form-group">
                <label for="accountType">Account Type</label>
                <select id="accountType" name="accountType" required>
                    <option value="" disabled selected>Select your profile type</option>
                    <option value="CASUAL">Casual (Public & Community Chats)</option>
                    <option value="CORPORATE">Corporate (Work & Private DMs)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="password">Create Password</label>
                <input type="password" id="password" name="password" placeholder="Create a strong password" required />
            </div>

            <button type="submit" class="auth-btn">Register</button>
        </form>

        <div class="auth-links">
            Already have an account? <a href="/login">Log in here</a>
        </div>
    </div>

</body>
</html>
